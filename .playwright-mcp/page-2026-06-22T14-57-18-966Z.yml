        - heading "האתגר" [level=3] [ref=e105]
        - generic [ref=e107]:
          - paragraph [ref=e108]: חברת רשת הגנה, חברה ותיקה ומוכרת המציעה פתרונות חדשניים של רשתות משולבות בסורגים חשמליים. בשל הפריסה על פני תחומים שונים אשר משתלבים אחד עם השני, בכדי להגיע לקהל היעד הרלוונטי, היה עלינו להתברג בתוצאות הראשונות עבור ביטויים הקשורים לרשתות לחלונות, סורגים (שקופים ורגילים) ומספר וריאציות נוספות של חיפושים רלוונטיים. בנוסף, החברה מציעה גם פתרונות הגבהה למרפסת. כל אחד מהנושאים הללו הוא תחום רווי בפני עצמו עם מתחרים המשקיעים שנים רבות בקידום אורגני ויש להם אחיזה איתנה בתוצאות החיפוש המובילות.
          - paragraph [ref=e109]: האתר הגיע לידנו לאחר תקופת קידום אצל מקדם אתרים מוכר מאוד. בתקופה זו, האתר הועשר בעשרות תכנים, אך לקה בחסר במספר אלמנטים הקשורים לטיב האופטימיזציה וההיררכיה. כמו כן, פרופיל הקישורים של האתר היה חלש מאוד ותמהיל האנקור טקסט נשען בצורה כבדה מדי על מילות מפתח ספציפיות, מה שפגע בטבעיות שלו וכתוצאה מכך הביא לתחילתה של ירידה רוחבית במיקומי האתר.
      - generic [ref=e111]:
        - heading "מה עשינו" [level=3] [ref=e116]
        - generic [ref=e118]:
          - paragraph [ref=e119]: "צללנו לעומק הנושאים הטכניים באתר, תחילה נגענו בנושאים שקשורים לחווית המשתמש: בתפריט העליון ובפוטר, סידרנו קישורים שבורים ואת התפריטים עצמם בצורה נוחה והגיונית יותר למשתמש. לאחר מכן שיפרנו את הפריסה והנראות של דף הבית, הוספנו תוכן רלוונטי ועדכנו את כותרת המטא כדי שתכיל את מילות המפתח העיקריות של הדף הראשי ובמקביל תניע יותר לפעולה."
          - paragraph [ref=e120]: איתרנו 36 פוסטים שלא היו שייכים לאף קטגוריה ועוד שתי קטגוריות ריקות מתכנים. הגדרנו קטגוריות רלוונטיות לכל אחד מהפוסטים באתר ומחקנו את הקטגוריות הריקות שלא היו משוייכים אליהם פוסטים.
          - paragraph [ref=e121]: זיהינו ותיקנו שגיאות כתיב שהיו בעמודים חשובים של האתר.
          - paragraph [ref=e122]: הסרנו הפניות רבות שהיו מוגדרות באתר ללא צורך ובכך העמיסו על הזחלנים וביזבזו את תקציב הזחילה לשווא. בנוסף, הוספנו עשרות קישורים פנימיים בין עמודי האתר השונים.
          - paragraph [ref=e123]: שיפרנו את מהירות האתר וביצענו אופטימיזציה בתמונות הקיימות.
          - paragraph [ref=e124]: וכמובן יצאנו בקמפיין להשגת קישורים איכותיים ורלוונטיים, תוך מיקוד באיזון פרופיל האנקור טקסט לתמהיל טבעי יותר המכיל יותר אנקורים נקיים וכאלו המכילים את שם המותג בתוכם (היינו זהירים עם שם המותג מכיוון שהוא גם מילת מפתח).
          - paragraph [ref=e125]
      - generic [ref=e127]:
        - heading "והתוצאות" [level=3] [ref=e132]
        - generic [ref=e134]:
          - paragraph [ref=e135]: "כבר בשנה הראשונה לפעילות, השינוי היה דרמטי: בחודשים הראשונים, הירידות של האתר בתוצאות החיפוש התחלפו בעליות חדות. ביטויים שהיו אי שם בעמודים 3-5 של גוגל, קפצו מהר מאוד לעמוד השני ומשם לראשון. כמות הפניות שמגיעות מהאתר עלתה באופן משמעותי ויצרה מגמה חיובית חזקה בעסק."
          - paragraph [ref=e136]: כיום, האתר חולש על העמוד הראשון בכל ביטויי החיפוש המשמעותיים בתחומו והתבסס כאוטוריטה ושם דבר גם בשל המוצר החדשני והיחודי שהוא מציע, וגם בשל הנראות הבולטת והחזקה שלו במגוון תחומים חופפים. זאת למרות שבתחומים רבים אנו מתמודדים מול מותגים גדולים ומוכרים אשר משקיעים שנים רבות בקידום האורגני של האתרים שלהם.
