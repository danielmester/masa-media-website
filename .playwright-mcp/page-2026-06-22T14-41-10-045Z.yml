        - generic [ref=e35]:
          - text: ״עלייה של 71% בטראפיק האורגני וביסוס השליטה בתחום״
          - heading "הלקוח" [level=2] [ref=e36]
          - heading "רשת הגנה" [level=1] [ref=e37]
          - heading "מטרת הפרויקט" [level=2] [ref=e38]
          - heading "קידום אתרים אורגני" [level=2] [ref=e39]
          - heading "האתגר" [level=3] [ref=e40]
          - paragraph [ref=e41]: חברת רשת הגנה, חברה ותיקה ומוכרת המציעה פתרונות חדשניים של רשתות משולבות בסורגים חשמליים. בשל הפריסה על פני תחומים שונים אשר משתלבים אחד עם השני, בכדי להגיע לקהל היעד הרלוונטי, היה עלינו להתברג בתוצאות הראשונות עבור ביטויים הקשורים לרשתות לחלונות, סורגים (שקופים ורגילים) ומספר וריאציות נוספות של חיפושים רלוונטיים. בנוסף, החברה מציעה גם פתרונות הגבהה למרפסת. כל אחד מהנושאים הללו הוא תחום רווי בפני עצמו עם מתחרים המשקיעים שנים רבות בקידום אורגני ויש להם אחיזה איתנה בתוצאות החיפוש המובילות.
          - paragraph [ref=e42]: האתר הגיע לידנו לאחר תקופת קידום אצל מקדם אתרים מוכר מאוד. בתקופה זו, האתר הועשר בעשרות תכנים, אך לקה בחסר במספר אלמנטים הקשורים לטיב האופטימיזציה וההיררכיה. כמו כן, פרופיל הקישורים של האתר היה חלש מאוד ותמהיל האנקור טקסט נשען בצורה כבדה מדי על מילות מפתח ספציפיות, מה שפגע בטבעיות שלו וכתוצאה מכך הביא לתחילתה של ירידה רוחבית במיקומי האתר.
          - heading "מה עשינו" [level=3] [ref=e43]
          - paragraph [ref=e44]: "צללנו לעומק הנושאים הטכניים באתר, תחילה נגענו בנושאים שקשורים לחווית המשתמש: בתפריט העליון ובפוטר, סידרנו קישורים שבורים ואת התפריטים עצמם בצורה נוחה והגיונית יותר למשתמש. לאחר מכן שיפרנו את הפריסה והנראות של דף הבית, הוספנו תוכן רלוונטי ועדכנו את כותרת המטא כדי שתכיל את מילות המפתח העיקריות של הדף הראשי ובמקביל תניע יותר לפעולה."
          - paragraph [ref=e45]: איתרנו 36 פוסטים שלא היו שייכים לאף קטגוריה ועוד שתי קטגוריות ריקות מתכנים. הגדרנו קטגוריות רלוונטיות לכל אחד מהפוסטים באתר ומחקנו את הקטגוריות הריקות שלא היו משוייכים אליהם פוסטים.
          - paragraph [ref=e46]: זיהינו ותיקנו שגיאות כתיב שהיו בעמודים חשובים של האתר.
          - paragraph [ref=e47]: הסרנו הפניות רבות שהיו מוגדרות באתר ללא צורך ובכך העמיסו על הזחלנים וביזבזו את תקציב הזחילה לשווא. בנוסף, הוספנו עשרות קישורים פנימיים בין עמודי האתר השונים.
          - paragraph [ref=e48]: שיפרנו את מהירות האתר וביצענו אופטימיזציה בתמונות הקיימות.
          - paragraph [ref=e49]: וכמובן יצאנו בקמפיין להשגת קישורים איכותיים ורלוונטיים, תוך מיקוד באיזון פרופיל האנקור טקסט לתמהיל טבעי יותר המכיל יותר אנקורים נקיים וכאלו המכילים את שם המותג בתוכם (היינו זהירים עם שם המותג מכיוון שהוא גם מילת מפתח).
          - heading "והתוצאות" [level=3] [ref=e50]
          - paragraph [ref=e51]: "כבר בשנה הראשונה לפעילות, השינוי היה דרמטי: בחודשים הראשונים, הירידות של האתר בתוצאות החיפוש התחלפו בעליות חדות. ביטויים שהיו אי שם בעמודים 3-5 של גוגל, קפצו מהר מאוד לעמוד השני ומשם לראשון. כמות הפניות שמגיעות מהאתר עלתה באופן משמעותי ויצרה מגמה חיובית חזקה בעסק."
          - paragraph [ref=e52]: כיום, האתר חולש על העמוד הראשון בכל ביטויי החיפוש המשמעותיים בתחומו והתבסס כאוטוריטה ושם דבר גם בשל המוצר החדשני והיחודי שהוא מציע, וגם בשל הנראות הבולטת והחזקה שלו במגוון תחומים חופפים. זאת למרות שבתחומים רבים אנו מתמודדים מול מותגים גדולים ומוכרים אשר משקיעים שנים רבות בקידום האורגני של האתרים שלהם.
